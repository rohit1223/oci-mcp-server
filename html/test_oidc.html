<!DOCTYPE html>
<html>
<head>
    <title>OIDC API Gateway Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 0;
        }
        button:hover {
            background-color: #45a049;
        }
        #response {
            margin-top: 20px;
            padding: 10px;
            background-color: #f4f4f4;
            border: 1px solid #ddd;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .error {
            color: red;
        }
        .success {
            color: green;
        }
    </style>
</head>
<body>
    <h1>OIDC API Gateway Test</h1>
    
    <h2>Test MCP Initialize</h2>
    <button onclick="testMCPInitialize()">Send Initialize Request</button>
    
    <h2>Test with Form Submit (follows redirects)</h2>
    <form id="testForm" action="https://irlxwomijighis2rzx3aj7n2c4.apigateway.us-ashburn-1.oci.oc-test.com/rdb/fallback-path" method="POST">
        <input type="hidden" name="data" value='{"jsonrpc":"2.0","method":"initialize","id":1,"params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}'>
        <button type="submit">Submit Form (Will Redirect to OIDC)</button>
    </form>
    
    <h2>Response:</h2>
    <div id="response"></div>

    <script>
        async function testMCPInitialize() {
            const responseDiv = document.getElementById('response');
            responseDiv.innerHTML = 'Sending request...';
            
            const requestData = {
                jsonrpc: "2.0",
                method: "initialize",
                id: 1,
                params: {
                    protocolVersion: "2024-11-05",
                    capabilities: {},
                    clientInfo: {
                        name: "test",
                        version: "1.0"
                    }
                }
            };
            
            try {
                const response = await fetch('https://irlxwomijighis2rzx3aj7n2c4.apigateway.us-ashburn-1.oci.oc-test.com/rdb/fallback-path', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json, text/event-stream'
                    },
                    body: JSON.stringify(requestData),
                    mode: 'cors',
                    credentials: 'include'
                });
                
                // Check if it's a redirect
                if (response.redirected) {
                    responseDiv.innerHTML = `<span class="error">Redirected to OIDC authentication:</span>\n${response.url}\n\nYou need to authenticate first. Open this URL in a new tab to login:\n<a href="${response.url}" target="_blank">${response.url}</a>`;
                    return;
                }
                
                const contentType = response.headers.get('content-type');
                let data;
                
                if (contentType && contentType.includes('application/json')) {
                    data = await response.json();
                } else if (contentType && contentType.includes('text/event-stream')) {
                    data = await response.text();
                } else {
                    data = await response.text();
                }
                
                if (response.ok) {
                    responseDiv.innerHTML = `<span class="success">Success (${response.status}):</span>\n${JSON.stringify(data, null, 2)}`;
                } else {
                    responseDiv.innerHTML = `<span class="error">Error (${response.status}):</span>\n${JSON.stringify(data, null, 2)}`;
                }
                
            } catch (error) {
                // CORS errors or network issues
                if (error.message.includes('CORS')) {
                    responseDiv.innerHTML = `<span class="error">CORS Error:</span>\nThe API Gateway needs to allow CORS for browser access.\n\nAlternatively, you're being redirected to authenticate.\nUse the form submit option above to follow the OIDC redirect.`;
                } else {
                    responseDiv.innerHTML = `<span class="error">Error:</span>\n${error.message}\n\nNote: If this is a CORS issue, the server needs to be configured to allow browser requests.`;
                }
            }
        }
    </script>
</body>
</html>
