<!DOCTYPE html>
<html>
<head>
    <title>Simple MCP Client</title>
    <style>
        body {
            font-family: monospace;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 5px;
        }
        button {
            background: #007acc;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            border-radius: 3px;
        }
        button:hover { background: #005a9e; }
        #response {
            background: #f8f8f8;
            padding: 15px;
            border: 1px solid #ddd;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        .url-display {
            background: #e8f4f8;
            padding: 10px;
            border-left: 4px solid #007acc;
            font-size: 12px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h1>Simple MCP Client</h1>
    
    <div class="container">
        <h3>Server: http://localhost:8000</h3>
        <button onclick="initialize()">Initialize</button>
        <button onclick="listTools()">List Tools</button>
        <button onclick="getDummyGateways()">Get Dummy Gateways</button>
        <button onclick="clearResponse()">Clear</button>
    </div>

    <div class="container">
        <h3>Last Request URL:</h3>
        <div id="lastUrl" class="url-display">None</div>
    </div>

    <div class="container">
        <h3>Response:</h3>
        <div id="response">Click a button to start...</div>
    </div>

    <script>
        const SERVER_URL = 'http://localhost:8000';
        let sessionId = null;

        async function makeRequest(method, params = null) {
            const url = new URL(`${SERVER_URL}/mcp`);
            url.searchParams.set('method', method);
            url.searchParams.set('id', Math.floor(Math.random() * 1000));
            
            if (params) {
                url.searchParams.set('params', JSON.stringify(params));
            }

            const headers = {};
            if (sessionId) {
                headers['x-session-id'] = sessionId;
            }

            document.getElementById('lastUrl').textContent = url.toString();

            try {
                const response = await fetch(url, { headers });
                
                // Get session ID from response
                const newSessionId = response.headers.get('x-session-id');
                if (newSessionId) {
                    sessionId = newSessionId;
                }

                const data = await response.json();
                document.getElementById('response').textContent = JSON.stringify(data, null, 2);
                
            } catch (error) {
                document.getElementById('response').textContent = `Error: ${error.message}`;
            }
        }

        function initialize() {
            makeRequest('initialize', {
                protocolVersion: '2024-11-05',
                capabilities: {},
                clientInfo: { name: 'simple-client', version: '1.0' }
            });
        }

        function listTools() {
            makeRequest('tools/list');
        }

        function getDummyGateways() {
            makeRequest('tools/call', {
                name: 'get_dummy_gateways_tool',
                arguments: {}
            });
        }

        function clearResponse() {
            document.getElementById('response').textContent = '';
            document.getElementById('lastUrl').textContent = 'None';
        }
    </script>
</body>
</html>
